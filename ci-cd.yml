name: CI/CD - Comercializadora Santa Cruz

# Se ejecuta en push y pull request hacia las ramas principales de Git Flow
on:
  push:
    branches: [main, develop, "release/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Compilar el proyecto
        run: go build ./...

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Ejecutar pruebas unitarias
        run: go test ./... -v -cover

  lint:
    name: Lint
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Ejecutar analisis estatico (golangci-lint)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  deploy:
    name: Deploy a Staging
    needs: [test, lint]
    if: github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/release/')
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Compilar binario para despliegue
        run: go build -o bin/santa-cruz-scm ./...

      - name: Desplegar a ambiente de Staging
        run: echo "Desplegando binario al ambiente de Staging..."
        # Reemplazar por el comando real de despliegue (ej. scp, Docker, Railway, Fly.io, etc.)
